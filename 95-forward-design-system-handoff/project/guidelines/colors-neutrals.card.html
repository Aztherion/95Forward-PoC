<!-- @dsCard group="Colors" viewport="700x150" name="Atmospheric neutrals" subtitle="High-altitude haze surfaces — the calm ground everything sits on" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { width: 150px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .name { font: var(--text-label); color: var(--text-strong); margin-top: 8px; }
  .role { font: var(--text-caption); color: var(--text-muted); margin-top: 1px; }
  .hex { font: var(--fw-medium) var(--fs-micro)/1.2 var(--font-mono); color: var(--text-secondary); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--haze-50)"></div><div class="name">Haze 50</div><div class="role">App background</div><div class="hex">#F7F9FA</div></div>
    <div class="sw"><div class="chip" style="background:var(--haze-100)"></div><div class="name">Haze 100</div><div class="role">Sunken well</div><div class="hex">#EFF2F4</div></div>
    <div class="sw"><div class="chip" style="background:var(--haze-200)"></div><div class="name">Haze 200</div><div class="role">Subtle fill</div><div class="hex">#E3E8EC</div></div>
    <div class="sw"><div class="chip" style="background:var(--white)"></div><div class="name">White</div><div class="role">Card surface</div><div class="hex">#FFFFFF</div></div>
  </div>
</body>
</html>
