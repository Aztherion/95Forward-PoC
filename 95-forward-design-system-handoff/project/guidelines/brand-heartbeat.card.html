<!-- @dsCard group="Brand" viewport="700x180" name="Cadence heartbeat" subtitle="The 24-hour follow-up made felt — a quiet pulse, never frantic" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px; display: flex; align-items: center; gap: 28px; }
  .beat { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-radius: var(--radius-pill);
          background: var(--gold-50); border: 1px solid var(--gold-300); }
  .pulse { width: 12px; height: 12px; border-radius: 50%; background: var(--gold-600);
           animation: f95-heartbeat var(--beat-period) var(--ease-in-out) infinite; }
  .beat .t { font: var(--text-label); color: var(--gold-700); }
  .desc { font: var(--text-body-r); color: var(--text-secondary); max-width: 360px; }
  .desc b { color: var(--text-strong); font-weight: var(--fw-semibold); }
</style>
</head>
<body>
  <div class="beat"><span class="pulse"></span><span class="t">Follow up by tomorrow · 18h left</span></div>
  <div class="desc"><b>Fast and good beats slow and perfect.</b> Cadence indicators carry a slow, alive pulse — momentum you can feel, set on a 2.6s heartbeat.</div>
</body>
</html>
