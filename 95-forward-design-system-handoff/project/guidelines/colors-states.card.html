<!-- @dsCard group="Colors" viewport="700x180" name="Semantic & states" subtitle="Success, attention, info, destructive — and the honorable Unknown" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: var(--radius-pill); font: var(--text-label); }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .unknown { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: var(--radius-pill);
             background: var(--unknown-surface); color: var(--unknown-ink); border: 1.5px dashed var(--unknown-border); font: var(--text-label); }
  .note { font: var(--text-caption); color: var(--text-secondary); margin-top: 16px; max-width: 620px; }
</style>
</head>
<body>
  <div class="row">
    <span class="pill" style="background:var(--sage-100); color:var(--sage-700)"><span class="dot" style="background:var(--sage-600)"></span> Success · Ask logged</span>
    <span class="pill" style="background:var(--gold-100); color:var(--gold-700)"><span class="dot" style="background:var(--gold-600)"></span> Attention · Follow up by tomorrow</span>
    <span class="pill" style="background:var(--blue-100); color:var(--blue-700)"><span class="dot" style="background:var(--blue-600)"></span> Info</span>
    <span class="pill" style="background:var(--brick-100); color:var(--brick-600)"><span class="dot" style="background:var(--brick-600)"></span> Destructive</span>
    <span class="unknown">Unknown — worth researching</span>
  </div>
  <div class="note">"Unknown" is honorable: a dashed, sunken, neutral treatment that reads as a research gap to fill — never red, never a broken field.</div>
</body>
</html>
