<!-- @dsCard group="Type" viewport="700x200" name="The score figure" subtitle="Tabular Hanken at display size — the QPI number, the signature" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 22px; display: flex; align-items: center; gap: 32px; }
  .score { font: var(--fw-heavy) var(--fs-score) / 0.9 var(--font-sans); font-feature-settings: var(--num-tabular); color: var(--gold-700); letter-spacing: var(--ls-tight); }
  .of { font: var(--fw-semibold) var(--fs-xl)/1 var(--font-sans); color: var(--text-muted); }
  .col .lbl { font: var(--fw-semibold) var(--fs-micro)/1 var(--font-sans); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--gold-700); }
  .col .desc { font: var(--text-caption); color: var(--text-secondary); margin-top: 6px; max-width: 320px; }
  .digits { font: var(--fw-bold) var(--fs-2xl)/1 var(--font-sans); font-feature-settings: var(--num-tabular); color: var(--text-strong); margin-top: 10px; letter-spacing: var(--ls-snug); }
</style>
</head>
<body>
  <div style="display:flex; align-items:baseline; gap:4px"><span class="score">92</span><span class="of">/100</span></div>
  <div class="col">
    <div class="lbl">Go — see them today</div>
    <div class="desc">The 90+ band gets the dawn-gold figure and a soft "go" ring. Tabular figures keep every score column aligned.</div>
    <div class="digits">0123456789</div>
  </div>
</body>
</html>
