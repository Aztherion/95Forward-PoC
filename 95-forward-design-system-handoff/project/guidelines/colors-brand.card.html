<!-- @dsCard group="Colors" viewport="700x150" name="Brand & roles" subtitle="Horizon blue, dawn gold, sage, and the reserved AI iris" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; }
  .chip { height: 56px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
  .name { font: var(--text-label); color: var(--text-strong); margin-top: 8px; }
  .role { font: var(--text-caption); color: var(--text-muted); margin-top: 1px; }
  .hex { font: var(--fw-medium) var(--fs-micro)/1.2 var(--font-mono); color: var(--text-secondary); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="name">Horizon Blue</div><div class="role">Primary · Relationship Manager</div><div class="hex">#235C86</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><div class="name">Dawn Gold</div><div class="role">Go / momentum · Today</div><div class="hex">#C8862A</div></div>
    <div class="sw"><div class="chip" style="background:var(--sage-600)"></div><div class="name">Sage</div><div class="role">Natural Partner · the door</div><div class="hex">#3B7458</div></div>
    <div class="sw"><div class="chip" style="background:var(--iris-600)"></div><div class="name">Iris</div><div class="role">AI / copilot — reserved</div><div class="hex">#4A4F94</div></div>
  </div>
</body>
</html>
