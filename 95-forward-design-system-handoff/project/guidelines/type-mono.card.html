<!-- @dsCard group="Type" viewport="700x170" name="Provenance mono" subtitle="IBM Plex Mono — citations, IDs, raw data. The signal of evidence." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 22px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .cite { font: var(--fw-medium) var(--fs-micro)/1.3 var(--font-mono); color: var(--ai-ink); background: var(--ai-tint); padding: 3px 7px; border-radius: var(--radius-xs); }
  .data { font: var(--fw-medium) var(--fs-small)/1.3 var(--font-mono); color: var(--text-secondary); }
  .lbl { font: var(--text-caption); color: var(--text-muted); width: 120px; flex: none; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">Source tags</span>
    <span class="cite">IRS 990-PF · 2024</span>
    <span class="cite">LinkedIn</span>
    <span class="cite">Board minutes</span>
  </div>
  <div class="row"><span class="lbl">Data / IDs</span>
    <span class="data">QPI 92 · CAP 24/25 · REL 22/25</span>
  </div>
  <div class="row"><span class="lbl">Record</span>
    <span class="data">PROS-04821 · updated 2026-06-14</span>
  </div>
</body>
</html>
