<!-- @dsCard group="Type" viewport="700x190" name="The human moment" subtitle="Newsreader — reserved for the ask, quotes, the conversation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 26px; }
  .moment { font: var(--fw-regular) var(--fs-2xl)/1.3 var(--font-serif); color: var(--text-strong); letter-spacing: var(--ls-snug); max-width: 560px; }
  .moment em { font-style: italic; color: var(--blue-600); }
  .attr { font: var(--text-caption); color: var(--text-muted); margin-top: 14px; letter-spacing: var(--ls-caps); text-transform: uppercase; font-weight: var(--fw-semibold); }
</style>
</head>
<body>
  <div class="moment">“Would you consider a gift of <em>$250,000</em> to name the new wing?”</div>
  <div class="attr">In-the-moment · Register B</div>
</body>
</html>
