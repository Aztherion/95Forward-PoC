<!-- @dsCard group="Colors" viewport="700x150" name="Ink scale" subtitle="Warm slate-blue text & structure — never pure black" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px; }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; }
  .chip { height: 60px; border-radius: var(--radius-sm); border: 1px solid rgba(22,32,43,0.06); }
  .name { font: var(--fw-medium) var(--fs-micro)/1.3 var(--font-mono); color: var(--text-secondary); margin-top: 6px; }
  .use { font: var(--text-caption); color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="name">900</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="name">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="name">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="name">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="name">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="name">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="name">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-200)"></div><div class="name">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-100)"></div><div class="name">100</div></div>
  </div>
  <div class="use">900 strong text · 700 body · 500 secondary · 400 muted/placeholder · 200 borders · 100 hairlines</div>
</body>
</html>
