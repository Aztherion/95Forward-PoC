<!-- @dsCard group="Colors" viewport="700x180" name="QPI parts" subtitle="The five visible inputs to the Qualified Prospect Index" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 48px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); display: flex; align-items: flex-end; padding: 6px 8px; }
  .num { font: var(--fw-bold) var(--fs-caption)/1 var(--font-mono); color: rgba(255,255,255,0.9); }
  .name { font: var(--text-label); color: var(--text-strong); margin-top: 8px; }
  .role { font: var(--text-caption); color: var(--text-muted); margin-top: 1px; }
  .note { font: var(--text-caption); color: var(--text-secondary); margin-top: 16px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--qpi-capacity)"><span class="num">/25</span></div><div class="name">Capacity</div><div class="role">Ability to give</div></div>
    <div class="sw"><div class="chip" style="background:var(--qpi-relationship)"><span class="num">/25</span></div><div class="name">Relationship</div><div class="role">Closeness</div></div>
    <div class="sw"><div class="chip" style="background:var(--qpi-timing)"><span class="num">/20</span></div><div class="name">Timing</div><div class="role">Readiness now</div></div>
    <div class="sw"><div class="chip" style="background:var(--qpi-history)"><span class="num">/15</span></div><div class="name">Gift History</div><div class="role">Past giving</div></div>
    <div class="sw"><div class="chip" style="background:var(--qpi-philanthropy)"><span class="num">/15</span></div><div class="name">Philanthropy</div><div class="role">Giving elsewhere</div></div>
  </div>
  <div class="note">Five harmonious hues, all from the family — distinguishable in a stacked bar, never garish. Weights shown are illustrative.</div>
</body>
</html>
