<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation" subtitle="Ink-tinted, soft, low — a quiet lift, plus the one warm 'go' ring" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--haze-50); padding: 26px; }
  .row { display: flex; gap: 22px; }
  .col { text-align: center; }
  .box { width: 96px; height: 60px; background: var(--white); border-radius: var(--radius-md); }
  .tok { font: var(--fw-medium) var(--fs-micro)/1 var(--font-mono); color: var(--text-secondary); margin-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="tok">sm</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="tok">md · card</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="tok">lg · popover</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="tok">xl · dialog</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--ring-go); border:1.5px solid var(--gold-500)"></div><div class="tok">ring-go · 90+</div></div>
  </div>
</body>
</html>
