<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keystone CRM + 95 Forward — PoC</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: var(--bg-app); }
  #root { min-height: 100vh; }

  /* ============================================================
     HOST REGISTER — "the grey room". Cooler, greyer, flatter,
     denser. Minimal brand color so 95 Forward's warmth reads as
     color entering the room.
     ============================================================ */
  .reg-host {
    --bg-app: #E7ECEF;
    --surface-card: #FFFFFF;
    --host-rule: #D5DCE1;
    --host-ink: #46545F;
    --host-ink-strong: #2A3640;
    --host-muted: #71808B;
    --host-fill: #EDF1F3;
    --host-fill-2: #E2E8EC;
  }

  /* shared table style for host registers (dense, calm) */
  .ks-table { width: 100%; border-collapse: collapse; font: var(--text-body-r); }
  .ks-table th {
    text-align: left; font: var(--fw-semibold) var(--fs-caption)/1 var(--font-sans);
    letter-spacing: 0.04em; text-transform: uppercase; color: var(--host-muted, var(--ink-400));
    padding: 15px 16px 11px; border-bottom: 1px solid var(--host-rule, var(--ink-100)); white-space: nowrap;
  }
  .ks-table td {
    padding: 13px 16px; border-bottom: 1px solid var(--host-rule, var(--ink-100));
    color: var(--ink-700); vertical-align: middle;
  }
  .ks-table tbody tr { transition: background 120ms ease; }
  .ks-table tbody tr:hover { background: var(--host-fill, var(--haze-50)); cursor: default; }
  .ks-table tbody tr.is-click { cursor: pointer; }
  .ks-num { font-feature-settings: var(--num-tabular); }

  /* scrollbars — quiet */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: rgba(70,84,95,0.22); border-radius: 99px; border: 3px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(70,84,95,0.36); background-clip: content-box; }

  .f95-rise { animation: f95-rise var(--dur-base) var(--ease-out) both; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="_ds_bundle.js"></script>
  <script src="data.js"></script>
  <script type="text/babel" data-presets="react" src="shell.jsx"></script>
  <script type="text/babel" data-presets="react" src="host_core.jsx"></script>
  <script type="text/babel" data-presets="react" src="host_more.jsx"></script>
  <script type="text/babel" data-presets="react" src="f95_today.jsx"></script>
  <script type="text/babel" data-presets="react" src="f95_prospects.jsx"></script>
  <script type="text/babel" data-presets="react" src="f95_prospect.jsx"></script>
  <script type="text/babel" data-presets="react" src="f95_greensheet.jsx"></script>
  <script type="text/babel" data-presets="react" src="f95_visit.jsx"></script>
  <script type="text/babel" data-presets="react" src="f95_initiatives.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
