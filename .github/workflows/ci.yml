name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      DATABASE_URL: postgres://forward:forward@localhost:5432/forward
      APP_DATABASE_URL: postgres://app_user:app_user@localhost:5432/forward
      APP_ENV: ci
      # Dummy Auth0 values: CI authenticates via the gated dev-login seam
      # (generateSessionCookie), so no live Auth0 tenant is needed.
      AUTH0_DOMAIN: test.us.auth0.com
      AUTH0_CLIENT_ID: test-client-id
      AUTH0_CLIENT_SECRET: test-client-secret
      AUTH0_SECRET: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      APP_BASE_URL: http://localhost:3100
      AUTH_DEV_LOGIN: "true"
      # AI runs in deterministic mock mode in CI — no ANTHROPIC/OPENAI keys, no paid calls.
      AI_MODE: mock
      # Background jobs (Initiative 11): demo research provider + the worker's own queue schema.
      RESEARCH_MODE: demo
      JOBS_SCHEMA: graphile_worker
      JOBS_CONCURRENCY: "3"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: forward
          POSTGRES_PASSWORD: forward
          POSTGRES_DB: forward
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forward -d forward"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Database setup (migrate + jobs schema + seed + embed)
        run: |
          pnpm db:wait
          pnpm db:migrate
          pnpm --filter @95forward/worker migrate:jobs
          pnpm --filter @95forward/db seed
          pnpm --filter @95forward/ai embed

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm --filter @95forward/web exec playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: pnpm --filter @95forward/web test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore
