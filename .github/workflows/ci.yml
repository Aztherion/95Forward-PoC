name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      DATABASE_URL: postgres://forward:forward@localhost:5432/forward
      APP_ENV: ci
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: forward
          POSTGRES_PASSWORD: forward
          POSTGRES_DB: forward
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forward -d forward"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Database migration (pgvector)
        run: |
          pnpm db:wait
          pnpm db:migrate

      - name: Install Playwright browser
        run: pnpm --filter @95forward/web exec playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: pnpm --filter @95forward/web test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore
