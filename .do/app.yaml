# DigitalOcean App Platform spec for 95 Forward.
# Operator setup before `doctl apps create --spec .do/app.yaml`:
#   - set the database `cluster_name` to your existing vector-enabled managed PG cluster
#     (the spec attaches that cluster; it does not provision a throwaway dev database)
#   - set region and instance sizes
#   - ensure the managed PG vector extension is allowed (the PRE_DEPLOY migrate
#     job runs CREATE EXTENSION IF NOT EXISTS vector)
#   - supply real values for every REPLACE_ME (Auth0 client id/secret; the
#     AUTH0_SECRET is a 32-byte hex from `openssl rand -hex 32`)
# The worker is a background `workers:` component (non-routable): the web app enqueues jobs via the
# database, not via HTTP, so the worker serves no public traffic and declares no port/route. It runs
# with its own minimal env (getWorkerEnv): no Auth0 vars; it needs APP_DATABASE_URL for RLS-scoped
# job handlers (its NestJS server binds internally on WORKER_PORT).
#
# Demo AI config (Initiative 13): AI_MODE=live + EMBEDDING_MODE=live give real reasoning and
# embeddings, while RESEARCH_MODE=demo keeps OSINT on seeded data only (the responsible-AI
# guardrail forbids live research on real individuals). Supply ANTHROPIC_API_KEY + OPENAI_API_KEY.
#
# ALLOW_DESTRUCTIVE_RESET=true (app-level) lets the operator run the guarded truncate-and-reseed
# against THIS demo database from a Console shell (see docs/deployment-and-ops-runbook.md). It is
# safe here only because the reset still refuses unless RESEARCH_MODE!=live AND --confirm is passed;
# never set it on a database holding real data.
name: ninety-five-forward
region: nyc

envs:
  - key: ALLOW_DESTRUCTIVE_RESET
    value: "true"

databases:
  - name: forward-db # keep this logical name — bindings use ${forward-db.DATABASE_URL}
    engine: PG
    cluster_name: REPLACE_ME_CLUSTER_NAME # operator: the actual managed cluster's name
    production: true

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: Aztherion/95Forward-PoC
      branch: main
    source_dir: /
    instance_size_slug: basic-xxs
    build_command: corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --frozen-lockfile && pnpm --filter @95forward/db build
    run_command: pnpm --filter @95forward/db migrate
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${forward-db.DATABASE_URL}

services:
  - name: web
    github:
      repo: Aztherion/95Forward-PoC
      branch: main
      deploy_on_push: true
    source_dir: /
    instance_size_slug: basic-xs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /
    build_command: corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --frozen-lockfile && pnpm --filter @95forward/shared build && pnpm --filter @95forward/db build && pnpm --filter @95forward/web build
    run_command: pnpm --filter @95forward/web exec next start --hostname 0.0.0.0 --port ${PORT}
    envs:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${forward-db.DATABASE_URL}
      - key: APP_DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_ME
      - key: NEXT_PUBLIC_APP_NAME
        value: "95 Forward"
      - key: NEXT_PUBLIC_HOST_NAME
        value: "Keystone CRM"
      - key: NEXT_PUBLIC_HOST_ORG
        value: "Water For People"
      - key: AUTH0_DOMAIN
        scope: RUN_AND_BUILD_TIME
        value: your-tenant.us.auth0.com
      - key: AUTH0_CLIENT_ID
        scope: RUN_AND_BUILD_TIME
        value: REPLACE_ME
      - key: AUTH0_CLIENT_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_ME
      - key: AUTH0_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_ME
      - key: APP_BASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: AI_MODE
        value: live
      - key: EMBEDDING_MODE
        value: live
      - key: RESEARCH_MODE
        value: demo
      - key: ANTHROPIC_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_ME
      - key: OPENAI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_ME

workers:
  - name: worker
    github:
      repo: Aztherion/95Forward-PoC
      branch: main
      deploy_on_push: true
    source_dir: /
    instance_size_slug: basic-xxs
    instance_count: 1
    build_command: corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --frozen-lockfile && pnpm --filter @95forward/shared build && pnpm --filter @95forward/db build && pnpm --filter @95forward/worker build
    run_command: pnpm --filter @95forward/worker start
    envs:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: WORKER_PORT
        value: "8080"
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${forward-db.DATABASE_URL}
      - key: APP_DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_ME
      - key: JOBS_CONCURRENCY
        value: "3"
      - key: JOBS_SCHEMA
        value: graphile_worker
      - key: AI_MODE
        value: live
      - key: EMBEDDING_MODE
        value: live
      - key: RESEARCH_MODE
        value: demo
      - key: ANTHROPIC_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_ME
      - key: OPENAI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_ME
